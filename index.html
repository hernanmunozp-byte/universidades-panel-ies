<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IES Chile — Panel Financiero 2024 · Matrícula 2025</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --border: #2e3347; --text: #e2e8f0; --muted: #8892a4;
    --accent: #6366f1; --accent2: #818cf8;
    --green: #22c55e; --yellow: #eab308; --orange: #f97316;
    --red: #ef4444; --blue: #3b82f6; --teal: #14b8a6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e3a5f 100%); padding: 24px 32px 20px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; color: #fff; }
  .header p { color: #a5b4fc; font-size: 13px; margin-top: 4px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }

  .stats { display: flex; gap: 12px; padding: 20px 32px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; min-width: 130px; flex: 1; }
  .stat-card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; }
  .stat-card .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
  .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat-card.blue .value   { color: #60a5fa; }
  .stat-card.green .value  { color: var(--green); }
  .stat-card.purple .value { color: #c084fc; }
  .stat-card.teal .value   { color: var(--teal); }
  .stat-card.orange .value { color: var(--orange); }
  .stat-card.red .value    { color: #f87171; }

  .controls { display: flex; align-items: center; gap: 10px; padding: 0 32px 16px; flex-wrap: wrap; }
  input[type=text] { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 14px; font-size: 13px; outline: none; width: 240px; transition: border-color 0.2s; }
  input[type=text]:focus { border-color: var(--accent); }
  select { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; cursor: pointer; }
  select:focus { border-color: var(--accent); }
  .btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 14px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .btn:hover { background: var(--border); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .count-label { color: var(--muted); font-size: 12px; margin-left: auto; }

  .tipo-checks { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tipo-checks label {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 11px; font-size: 12px;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .tipo-checks input[type=checkbox] { display: none; }
  .tipo-checks label:has(input:checked) { border-color: var(--accent); background: rgba(99,102,241,.18); color: #c4b5fd; }
  .tipo-checks label:hover { border-color: var(--accent2); }

  .table-wrap { padding: 0 32px 32px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); }
  th { padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--text); }
  th .sort-icon { opacity: 0.4; margin-left: 4px; }
  th.sorted .sort-icon { opacity: 1; color: var(--accent2); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 10px 12px; vertical-align: middle; }
  .ies-name { font-weight: 500; color: var(--text); }
  .ies-sub { color: var(--muted); font-size: 12px; }

  .badge { display: inline-block; border-radius: 5px; padding: 2px 8px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-green  { background: rgba(34,197,94,.15);  color: #4ade80; }
  .badge-red    { background: rgba(239,68,68,.15);   color: #f87171; }
  .badge-yellow { background: rgba(234,179,8,.15);   color: #fbbf24; }
  .badge-orange { background: rgba(249,115,22,.15);  color: #fb923c; }
  .badge-gray   { background: rgba(148,163,184,.1);  color: #94a3b8; }
  .badge-blue   { background: rgba(59,130,246,.15);  color: #60a5fa; }
  .badge-purple { background: rgba(99,102,241,.15);  color: #818cf8; }
  .badge-teal   { background: rgba(20,184,166,.15);  color: #2dd4bf; }
  .badge-indigo { background: rgba(99,102,241,.12);  color: #a78bfa; }
  .badge-pink   { background: rgba(236,72,153,.15);  color: #f472b6; }
  .badge-cerrada { background: rgba(239,68,68,.22);  color: #fca5a5; border: 1px solid rgba(239,68,68,.45); letter-spacing: 0.4px; }

  tbody tr.row-cerrada { background: rgba(239,68,68,.04); }
  tbody tr.row-cerrada:hover { background: rgba(239,68,68,.09); }

  .acred-bar { display: flex; align-items: center; gap: 6px; }
  .acred-stars { display: flex; gap: 2px; }
  .acred-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
  .acred-dot.filled.c7 { background: #22c55e; }
  .acred-dot.filled.c6 { background: #84cc16; }
  .acred-dot.filled.c5 { background: #eab308; }
  .acred-dot.filled.c4 { background: #f97316; }
  .acred-dot.filled.c3 { background: #ef4444; }
  .acred-num { font-size: 12px; color: var(--muted); width: 14px; }

  .margen-pos  { color: #4ade80; font-weight: 500; }
  .margen-neg  { color: #f87171; font-weight: 500; }
  .margen-zero { color: var(--muted); }

  .red-G9     { background: rgba(99,102,241,.15); color: #a78bfa; }
  .red-CRUCH  { background: rgba(99,102,241,.15); color: #a78bfa; }
  .red-CUECH  { background: rgba(20,184,166,.15); color: #2dd4bf; }
  .red-CUP    { background: rgba(59,130,246,.15); color: #60a5fa; }
  .red-Privada { background: rgba(148,163,184,.1); color: #94a3b8; }
  .red-Vertebral { background: rgba(245,158,11,.18); color: #fbbf24; }

  .sis-Ozmo    { background: rgba(34,197,94,.18);  color: #4ade80; border: 1px solid rgba(34,197,94,.35); }
  .sis-Uplus   { background: rgba(234,179,8,.15);  color: #fde047; border: 1px solid rgba(234,179,8,.3); }
  .sis-UCampus { background: rgba(239,68,68,.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
  .sis-SAP     { background: rgba(20,184,166,.15); color: #5eead4; border: 1px solid rgba(20,184,166,.3); }
  .sis-Banner  { background: rgba(59,130,246,.18); color: #93c5fd; border: 1px solid rgba(59,130,246,.35); }
  .sis-Propio  { background: rgba(168,85,247,.15); color: #d8b4fe; border: 1px solid rgba(168,85,247,.3); }
  .sis-ND      { background: rgba(148,163,184,.1); color: #94a3b8; }

  .cards-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; padding: 0 32px 32px; }
  .cards-grid.active { display: grid; }
  .table-wrap.hidden { display: none; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: border-color 0.2s; }
  .card:hover { border-color: var(--accent); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-acronimo { width: 46px; height: 46px; border-radius: 10px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--accent2); text-align: center; line-height: 1.2; flex-shrink: 0; }
  .card-name { font-weight: 600; font-size: 13px; line-height: 1.4; flex: 1; padding-left: 10px; }
  .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .card-stat-item { background: var(--surface2); border-radius: 7px; padding: 8px 10px; }
  .card-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .card-stat-value { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; flex-wrap: wrap; gap: 6px; }
  .hidden { display: none; }

  @media (max-width: 768px) {
    .header, .stats, .controls, .table-wrap, .cards-grid { padding-left: 16px; padding-right: 16px; }
    .stat-card { min-width: 110px; }
    input[type=text] { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <h1>IES Chile — Panel Financiero 2024 · Matrícula 2025</h1>
      <p>Universidades · CFTs · Institutos Profesionales · Datos MINEDUC/SIES 2024 · Matrícula SIES 2025</p>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn active" id="btnTable" onclick="setView('table')">☰ Tabla</button>
      <button class="btn" id="btnCards" onclick="setView('cards')">⊞ Tarjetas</button>
    </div>
  </div>
</div>

<div class="stats" id="statsBar"></div>

<div class="controls">
  <input type="text" id="search" placeholder="🔍  Buscar institución..." oninput="applyFilters()">
  <div class="tipo-checks">
    <label><input type="checkbox" value="univ_cruch" onchange="applyFilters()"> Univ. CRUCH</label>
    <label><input type="checkbox" value="univ_priv"  onchange="applyFilters()"> Univ. Privadas</label>
    <label><input type="checkbox" value="ip"         onchange="applyFilters()"> Inst. Prof.</label>
    <label><input type="checkbox" value="cft_estatal" onchange="applyFilters()"> CFT Estatal</label>
    <label><input type="checkbox" value="cft_priv"    onchange="applyFilters()"> CFT Privado</label>
  </div>
  <select id="filterGrat" onchange="applyFilters()">
    <option value="">Gratuidad: todas</option>
    <option value="Si">Con gratuidad</option>
    <option value="No">Sin gratuidad</option>
  </select>
  <select id="filterRed" onchange="applyFilters()">
    <option value="">Red: todas</option>
    <option value="G9">G9</option>
    <option value="CUECH">CUECH</option>
    <option value="CUP">CUP</option>
    <option value="Privada">Privada</option>
    <option value="Vertebral">Vertebral</option>
  </select>
  <select id="filterMargen" onchange="applyFilters()">
    <option value="">Margen: todos</option>
    <option value="pos">Con ganancia</option>
    <option value="neg">Con pérdida</option>
  </select>
  <select id="filterSis" onchange="applyFilters()">
    <option value="">SIS actual: todos</option>
    <option value="Ozmo">Ozmo (Global Campus)</option>
    <option value="U+">U+ Bettersoft</option>
    <option value="UCampus">UCampus</option>
    <option value="SAP">SAP académico</option>
    <option value="Banner">Banner (Ellucian)</option>
    <option value="Propio">Propio (desarrollo interno)</option>
    <option value="N/D">Por verificar (N/D)</option>
  </select>
  <button class="btn" onclick="clearFilters()">✕ Limpiar</button>
  <span class="count-label" id="countLabel"></span>
</div>

<div class="table-wrap" id="tableWrap">
  <table id="mainTable">
    <thead>
      <tr>
        <th onclick="sortBy('n')" data-col="n">Institución <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('tipo')" data-col="tipo">Tipo <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('m')" data-col="m" style="text-align:right">Matrícula <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('acred')" data-col="acred">Acreditación <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('g')" data-col="g">Gratuidad <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('r')" data-col="r">Red <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('sis')" data-col="sis">SIS actual <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('ing')" data-col="ing" style="text-align:right">Ingresos op. <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('act')" data-col="act" style="text-align:right">Activos <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('mg')" data-col="mg" style="text-align:right">Margen op. <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('gan')" data-col="gan" style="text-align:right">Resultado <span class="sort-icon">↕</span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="cards-grid" id="cardsGrid"></div>

// ── HELPERS ──
let sortCol = 'ing', sortAsc = false, filtered = [...DATA];

function matNum(m) { return parseInt((m||'0').replace(/,/g,'')) || 0; }

function tipoLabel(t) {
  return {univ_cruch:'Univ. CRUCH', univ_priv:'Univ. Privada', ip:'Inst. Prof.', cft:'CFT'}[t] || t;
}
function tipoBadgeClass(t) {
  return {univ_cruch:'badge-purple', univ_priv:'badge-blue', ip:'badge-teal', cft:'badge-orange'}[t] || 'badge-gray';
}
function acredClass(n) {
  if (n >= 7) return 'c7'; if (n >= 6) return 'c6'; if (n >= 5) return 'c5';
  if (n >= 4) return 'c4'; return 'c3';
}
function acredDots(n) {
  if (n < 0) return '<span style="color:var(--muted);font-size:11px;">—</span>';
  if (n === 0) return '<span class="badge badge-gray">Sin acred.</span>';
  let html = '<div class="acred-bar"><div class="acred-stars">';
  for (let i = 1; i <= 7; i++) {
    const cl = i <= n ? `filled ${acredClass(n)}` : '';
    html += `<div class="acred-dot ${cl}"></div>`;
  }
  html += `</div><span class="acred-num">${n}</span></div>`;
  return html;
}
function gratBadge(g) {
  if (!g) return '<span style="color:var(--muted);font-size:11px;">—</span>';
  return g === 'Si' ? '<span class="badge badge-green">Gratuita</span>' : '<span class="badge badge-gray">No</span>';
}
function redBadge(r) {
  if (!r) return '<span style="color:var(--muted);font-size:11px;">—</span>';
  return `<span class="badge red-${r}">${r}</span>`;
}
function sisValue(d) { return d.sis || 'N/D'; }
function sisBadge(d) {
  const s = sisValue(d);
  const cls = { 'Ozmo':'sis-Ozmo', 'U+':'sis-Uplus', 'UCampus':'sis-UCampus',
                'SAP':'sis-SAP', 'Banner':'sis-Banner', 'Propio':'sis-Propio', 'N/D':'sis-ND' }[s] || 'sis-ND';
  return `<span class="badge ${cls}">${s}</span>`;
}
function margenCell(mg) {
  if (mg === undefined || mg === null) return '<span class="margen-zero">—</span>';
  const arrow = mg > 0 ? '▲' : mg < 0 ? '▼' : '';
  const cls = mg > 0 ? 'margen-pos' : mg < 0 ? 'margen-neg' : 'margen-zero';
  const display = Math.abs(mg) > 200 ? (mg > 0 ? '>200%' : '<-200%') : mg.toFixed(1) + '%';
  return `<span class="${cls}">${arrow} ${display}</span>`;
}
function mmCell(v, color) {
  if (!v) return '<span style="color:var(--muted)">—</span>';
  const c = color || 'var(--text)';
  return `<span style="color:${c}">$${v.toLocaleString()} MM</span>`;
}
function ganCell(v) {
  if (v === 0) return '<span style="color:var(--muted)">—</span>';
  const sign = v > 0 ? '+' : '';
  const cls = v > 0 ? '#4ade80' : '#f87171';
  return `<span style="color:${cls};font-weight:500">${sign}${v.toLocaleString()} MM</span>`;
}
function matCell(m, tipo) {
  if (!m) return '<span style="color:var(--muted)">—</span>';
  return `<span style="font-weight:600">${m}</span>`;
}

// ── STATS ──
function renderStats(data) {
  const total = data.length;
  const univs   = data.filter(d => d.tipo === 'univ_cruch' || d.tipo === 'univ_priv').length;
  const ips     = data.filter(d => d.tipo === 'ip').length;
  const cfts    = data.filter(d => d.tipo === 'cft').length;
  const conPerd = data.filter(d => d.gan < 0).length;
  const totalIng = data.reduce((s,d) => s + d.ing, 0);
  const totalMat = data.reduce((s,d) => s + matNum(d.m), 0);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card blue"><div class="label">Total IES</div><div class="value">${total}</div><div class="sub">en el filtro</div></div>
    <div class="stat-card purple"><div class="label">Universidades</div><div class="value">${univs}</div><div class="sub">CRUCH + privadas</div></div>
    <div class="stat-card teal"><div class="label">IPs + CFTs</div><div class="value">${ips + cfts}</div><div class="sub">${ips} IPs · ${cfts} CFTs</div></div>
    <div class="stat-card green"><div class="label">Matrícula 2025</div><div class="value">${totalMat > 0 ? (totalMat/1000).toFixed(0)+'k' : '—'}</div><div class="sub">estudiantes</div></div>
    <div class="stat-card orange"><div class="label">Ingresos sistema</div><div class="value">$${(totalIng/1000).toFixed(0)}B</div><div class="sub">miles de millones $</div></div>
    <div class="stat-card red"><div class="label">Con pérdidas</div><div class="value">${conPerd}</div><div class="sub">${Math.round(conPerd/total*100)}% del total</div></div>
  `;
}

// ── SORT ──
function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = (col === 'n' || col === 'tipo'); }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  const th = document.querySelector(`th[data-col="${col}"]`);
  if (th) { th.classList.add('sorted'); th.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓'; }
  applyFilters();
}

// ── FILTER + RENDER ──
function applyFilters() {
  const q      = document.getElementById('search').value.toLowerCase().trim();
  const tiposChecked = [...document.querySelectorAll('.tipo-checks input:checked')].map(el => el.value);
  const grat   = document.getElementById('filterGrat').value;
  const red    = document.getElementById('filterRed').value;
  const margen = document.getElementById('filterMargen').value;
  const sis    = document.getElementById('filterSis').value;

  filtered = DATA.filter(d => {
    if (q && !d.n.toLowerCase().includes(q) && !d.a.toLowerCase().includes(q) && !(d.s||'').toLowerCase().includes(q)) return false;
    if (tiposChecked.length) {
      const tipoExpandido = d.tipo === 'cft' ? (d.estatal ? 'cft_estatal' : 'cft_priv') : d.tipo;
      if (!tiposChecked.includes(tipoExpandido)) return false;
    }
    if (grat && d.g !== grat) return false;
    if (red && d.r !== red) return false;
    if (margen === 'pos' && d.gan <= 0) return false;
    if (margen === 'neg' && d.gan >= 0) return false;
    if (sis && sisValue(d) !== sis) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va, vb;
    if      (sortCol === 'm')    { va = matNum(a.m); vb = matNum(b.m); }
    else if (sortCol === 'ing')  { va = a.ing; vb = b.ing; }
    else if (sortCol === 'act')  { va = a.act; vb = b.act; }
    else if (sortCol === 'mg')   { va = a.mg; vb = b.mg; }
    else if (sortCol === 'gan')  { va = a.gan; vb = b.gan; }
    else if (sortCol === 'acred'){ va = a.acred; vb = b.acred; }
    else if (sortCol === 'sis')  { va = sisValue(a).toLowerCase(); vb = sisValue(b).toLowerCase(); }
    else { va = (a[sortCol]||'').toLowerCase(); vb = (b[sortCol]||'').toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  renderStats(filtered);
  document.getElementById('countLabel').textContent = `${filtered.length} instituciones`;
  renderTable();
  renderCards();
}

function renderTable() {
  document.getElementById('tableBody').innerHTML = filtered.map(d => `
    <tr class="${d.er === 'cerrada' ? 'row-cerrada' : ''}">
      <td>
        <div class="ies-name">${d.n}${d.er === 'cerrada' ? ` <span class="badge badge-cerrada" title="${d.erNota || 'Reconocimiento revocado por MINEDUC'}">CERRADA</span>` : ''}</div>
        ${d.a ? `<div class="ies-sub">${d.a}${d.s ? ' · ' + d.s : ''}</div>` : (d.s ? `<div class="ies-sub">${d.s}</div>` : '')}
      </td>
      <td><span class="badge ${tipoBadgeClass(d.tipo)}">${tipoLabel(d.tipo)}</span></td>
      <td style="text-align:right">${matCell(d.m, d.tipo)}</td>
      <td>${acredDots(d.acred)}</td>
      <td>${gratBadge(d.g)}</td>
      <td>${redBadge(d.r)}</td>
      <td>${sisBadge(d)}</td>
      <td style="text-align:right">${mmCell(d.ing, '#a78bfa')}</td>
      <td style="text-align:right">${mmCell(d.act, '#60a5fa')}</td>
      <td style="text-align:right">${margenCell(d.mg)}</td>
      <td style="text-align:right">${ganCell(d.gan)}</td>
    </tr>
  `).join('');
}

function renderCards() {
  document.getElementById('cardsGrid').innerHTML = filtered.map(d => {
    const mgColor = d.mg > 0 ? '#4ade80' : '#f87171';
    const ganColor = d.gan > 0 ? '#4ade80' : d.gan < 0 ? '#f87171' : '#8892a4';
    const ganText = d.gan !== 0 ? (d.gan > 0 ? '+' : '') + d.gan.toLocaleString() + ' MM' : '—';
    return `
    <div class="card">
      <div class="card-header">
        <div style="flex:1">
          <div style="margin-bottom:6px"><span class="badge ${tipoBadgeClass(d.tipo)}">${tipoLabel(d.tipo)}</span>${d.er === 'cerrada' ? ` <span class="badge badge-cerrada" title="${d.erNota || 'Reconocimiento revocado'}">CERRADA</span>` : ''}</div>
          <div class="card-name">${d.n}</div>
          ${d.s ? `<div class="ies-sub" style="margin-top:2px">📍 ${d.s}</div>` : ''}
        </div>
        <div class="card-acronimo">${(d.a||'—').substring(0,8)}</div>
      </div>
      <div class="card-stats">
        <div class="card-stat-item">
          <div class="card-stat-label">Ingresos op.</div>
          <div class="card-stat-value" style="color:#a78bfa">${d.ing ? '$'+d.ing.toLocaleString()+' MM' : '—'}</div>
        </div>
        <div class="card-stat-item">
          <div class="card-stat-label">Activos</div>
          <div class="card-stat-value" style="color:#60a5fa">${d.act ? '$'+d.act.toLocaleString()+' MM' : '—'}</div>
        </div>
        <div class="card-stat-item">
          <div class="card-stat-label">Margen op.</div>
          <div class="card-stat-value" style="color:${mgColor}">${d.mg !== undefined ? (Math.abs(d.mg)>200 ? (d.mg>0?'>200%':'<−200%') : d.mg.toFixed(1)+'%') : '—'}</div>
        </div>
        <div class="card-stat-item">
          <div class="card-stat-label">Resultado</div>
          <div class="card-stat-value" style="color:${ganColor}">${ganText}</div>
        </div>
      </div>
      <div class="card-footer">
        ${d.acred >= 0 ? acredDots(d.acred) : ''}
        ${d.g ? gratBadge(d.g) : ''}
        ${d.r ? redBadge(d.r) : ''}
        ${sisBadge(d)}
      </div>
    </div>`;
  }).join('');
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.querySelectorAll('.tipo-checks input').forEach(el => el.checked = false);
  document.getElementById('filterGrat').value = '';
  document.getElementById('filterRed').value = '';
  document.getElementById('filterMargen').value = '';
  document.getElementById('filterSis').value = '';
  applyFilters();
}

function setView(v) {
  const tw = document.getElementById('tableWrap');
  const cg = document.getElementById('cardsGrid');
  if (v === 'table') {
    tw.classList.remove('hidden'); cg.classList.remove('active');
    document.getElementById('btnTable').classList.add('active');
    document.getElementById('btnCards').classList.remove('active');
  } else {
    tw.classList.add('hidden'); cg.classList.add('active');
    document.getElementById('btnCards').classList.add('active');
    document.getElementById('btnTable').classList.remove('active');
  }
}

sortBy('ing');
</script>
</body>
</html>
